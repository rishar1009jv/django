<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Subject</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #2c7be5, #6a11cb);
            min-height: 100vh;
            padding: 40px 0;
        }

        .container {
            width: 85%;
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        h2 {
            margin-bottom: 20px;
            color: #2f3640;
        }

        /* Form Styling */
        .form-group {
            position: relative;
            margin-bottom: 20px;
        }

        .form-group i {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            color: #888;
        }

        .form-group input {
            width: 100%;
            padding: 12px 12px 12px 38px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: #2c7be5;
            box-shadow: 0 0 6px rgba(44,123,229,0.3);
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .add-btn {
            background-color: #2c7be5;
            color: white;
        }

        .add-btn:hover {
            background-color: #1a68d1;
            transform: translateY(-2px);
        }

        .delete-btn {
            background-color: #e63757;
            color: white;
        }

        .delete-btn:hover {
            background-color: #c82333;
            transform: translateY(-2px);
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            border-radius: 10px;
            overflow: hidden;
        }

        table th {
            background-color: #2c7be5;
            color: white;
            padding: 12px;
            text-align: left;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        table tr:hover {
            background-color: #f8f9fa;
        }

        .empty-row {
            text-align: center;
            padding: 20px;
            color: #888;
        }

        hr {
            margin: 35px 0;
            border: none;
            border-top: 1px solid #eee;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            text-decoration: none;
            color: #2c7be5;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .container {
                width: 95%;
                padding: 25px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <h2><i class="fas fa-book"></i> Add Subject</h2>

    <!-- ADD SUBJECT FORM -->
    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <i class="fas fa-hashtag"></i>
            <input type="text" name="subject_code" placeholder="Subject Code" required>
        </div>

        <div class="form-group">
            <i class="fas fa-book-open"></i>
            <input type="text" name="subject_name" placeholder="Subject Name" required>
        </div>

        <button type="submit" class="add-btn">
            <i class="fas fa-plus"></i> Add Subject
        </button>
    </form>

    <hr>

    <h2><i class="fas fa-list"></i> Your Subjects</h2>

    <table>
        <tr>
            <th>Subject Code</th>
            <th>Subject Name</th>
            <th>Action</th>
        </tr>

        {% for subject in subjects %}
        <tr>
            <td>{{ subject.subject_code }}</td>
            <td>{{ subject.subject_name }}</td>
            <td>
                <form method="POST" style="display:inline;">
                    {% csrf_token %}
                    <input type="hidden" name="delete_id" value="{{ subject.id }}">
                    <button type="submit" class="delete-btn">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </form>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3" class="empty-row">
                No subjects added yet.
            </td>
        </tr>
        {% endfor %}
    </table>

    <a href="{% url 'dashboard' %}" class="back-link">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
