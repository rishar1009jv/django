<!DOCTYPE html>
<html>
<head>
    <title>Manage Students</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            padding: 40px 0;
        }

        .container {
            width: 85%;
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        h2, h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .icon-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon-title i {
            color: #4e73df;
        }

        form input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
            transition: 0.3s;
        }

        form input[type="text"]:focus {
            border-color: #4e73df;
            outline: none;
            box-shadow: 0 0 5px rgba(78,115,223,0.3);
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .add-btn {
            background-color: #4e73df;
            color: white;
        }

        .add-btn:hover {
            background-color: #2e59d9;
        }

        .delete-btn {
            background-color: #e74a3b;
            color: white;
        }

        .delete-btn:hover {
            background-color: #c0392b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table th {
            background-color: #4e73df;
            color: white;
            padding: 12px;
            text-align: left;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        table tr:hover {
            background-color: #f8f9fc;
        }

        .empty-row {
            text-align: center;
            padding: 20px;
            color: #777;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            text-decoration: none;
            color: #4e73df;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

<div class="container">

    <div class="icon-title">
        <i class="fas fa-user-graduate fa-2x"></i>
        <h2>Manage Students</h2>
    </div>

    <!-- ADD STUDENT FORM -->
    <form method="POST">
        {% csrf_token %}

        <label>Register Number</label>
        <input type="text" name="studentReg" placeholder="Enter Register Number" required>

        <label>Student Name</label>
        <input type="text" name="studentName" placeholder="Enter Student Name" required>

        <button type="submit" class="add-btn">
            <i class="fas fa-plus"></i> Add Student
        </button>
    </form>

    <hr>

    <div class="icon-title">
        <i class="fas fa-list fa-lg"></i>
        <h3>Student List</h3>
    </div>

    <table>
        <tr>
            <th><i class="fas fa-id-card"></i> Reg No</th>
            <th><i class="fas fa-user"></i> Name</th>
            <th><i class="fas fa-cogs"></i> Action</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.studentReg }}</td>
            <td>{{ student.studentName }}</td>
            <td>
                <form method="POST" style="display:inline;">
                    {% csrf_token %}
                    <input type="hidden" name="delete_id" value="{{ student.id }}">
                    <button type="submit" class="delete-btn">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </form>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3" class="empty-row">
                <i class="fas fa-info-circle"></i> No students added yet.
            </td>
        </tr>
        {% endfor %}

    </table>

    <a href="{% url 'dashboard' %}" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
    </a>

</div>

</body>
</html>
