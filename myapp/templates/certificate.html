<!DOCTYPE html>
<html>
<head>
    <title>Upload Certificate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #43cea2, #185a9d);
            padding: 40px 0;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: auto;
            background: #fff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        h2, h3 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .upload-box {
            border: 2px dashed #43cea2;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 25px;
            background: #f9fffd;
        }

        input[type="file"] {
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: #43cea2;
            outline: none;
            box-shadow: 0 0 5px rgba(67,206,162,0.4);
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .upload-btn {
            background: #43cea2;
            color: white;
        }

        .upload-btn:hover {
            background: #2bbf92;
        }

        .delete-btn {
            background: #e74a3b;
            color: white;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .certificate-card {
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            background: #f8f9fc;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .certificate-card a {
            color: #185a9d;
            text-decoration: none;
            font-weight: 500;
        }

        .certificate-card a:hover {
            text-decoration: underline;
        }

        .card-actions {
            margin-top: 10px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            text-decoration: none;
            color: #185a9d;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .empty-text {
            text-align: center;
            color: #666;
        }

    </style>
</head>
<body>

<div class="container">

    <h2><i class="fas fa-certificate"></i> Upload Certificate</h2>

    <div class="upload-box">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <input type="file" name="file" required><br>

            <textarea name="description"
                      placeholder="Write short summary about this certificate"
                      rows="4"
                      required></textarea><br><br>

            <button type="submit" class="upload-btn">
                <i class="fas fa-upload"></i> Upload
            </button>
        </form>
    </div>

    <hr>

    <h3><i class="fas fa-folder-open"></i> Your Certificates</h3>

    {% for cert in certificates %}
        <div class="certificate-card">

            <p>
                <strong><i class="fas fa-file"></i> File:</strong>
                <a href="{{ cert.file.url }}" target="_blank">
                    {{ cert.file.name }}
                </a>
            </p>

            <p>
                <strong><i class="fas fa-align-left"></i> Description:</strong><br>
                {{ cert.description }}
            </p>

            <div class="card-actions">
                <a href="{{ cert.file.url }}" download>
                    <i class="fas fa-download"></i> Download
                </a>

                <form method="POST" style="display:inline;">
                    {% csrf_token %}
                    <input type="hidden" name="delete_id" value="{{ cert.id }}">
                    <button type="submit" class="delete-btn">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </form>
            </div>

        </div>

    {% empty %}
        <p class="empty-text">
            <i class="fas fa-info-circle"></i> No certificates uploaded yet.
        </p>
    {% endfor %}

    <a href="{% url 'student_dashboard' %}" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
    </a>

</div>

</body>
</html>
